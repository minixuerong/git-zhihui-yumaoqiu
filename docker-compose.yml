version: "3.8"

services:
  mysql:
    image: docker.1ms.run/library/mysql:8.0
    container_name: zhihui-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: capability_graph
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_net

  backend:
    build: ./backend
    container_name: zhihui-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root123@mysql:3306/capability_graph
      SECRET_KEY: docker-secret-key-2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      API_V1_STR: /api/v1
      DEBUG: "False"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
    ports:
      - "8000:8000"
    networks:
      - app_net

  frontend:
    build: ./frontend
    container_name: zhihui-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
